name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run prisma:generate:example

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npm run check

      - name: Build package and UI
        run: npm run build

  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run prisma:generate:example

      - name: Adapter contract tests
        run: npm run test:adapters

      - name: Backend end-to-end tests
        run: npm run test:e2e

  frontend-smoke:
    name: Frontend Smoke
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run prisma:generate:example

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Frontend smoke tests
        run: npm run test:frontend-smoke

  examples:
    name: Example Apps
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DB_HOST: 127.0.0.1
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: nestjs_dj_admin_demo
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/nestjs_dj_admin_prisma?schema=public

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run prisma:generate:example

      - name: Wait for Postgres
        run: until pg_isready -h 127.0.0.1 -p 5432 -U postgres; do sleep 1; done

      - name: Setup TypeORM example database
        run: npm run typeorm:setup:example

      - name: Setup Prisma example database
        run: npm run prisma:setup:example

      - name: Build examples
        run: npm run build:examples
