name: Release

on:
  release:
    types:
      - published

concurrency:
  group: release-${{ github.event.release.tag_name }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish Package
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run prisma:generate:example

      - name: Verify release tag matches package version
        run: |
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          RELEASE_TAG="${{ github.event.release.tag_name }}"
          if [ "$RELEASE_TAG" != "$PACKAGE_VERSION" ]; then
            echo "Release tag $RELEASE_TAG does not match package.json version $PACKAGE_VERSION"
            exit 1
          fi

      - name: Build package
        run: npm run build

      - name: Verify packaged contents
        run: npm pack --dry-run

      - name: Publish to npm with token fallback
        id: publish_token
        run: npm publish --provenance
        continue-on-error: true
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish to npm with Trusted Publishing
        if: steps.publish_token.outcome == 'failure'
        run: npm publish --provenance
